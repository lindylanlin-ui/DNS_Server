services:
  coredns:
    build:
      context: .
      dockerfile: Dockerfile
    image: dns_server-coredns:local
    container_name: internal-dns
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    read_only: true
    logging:
      driver: none
    tmpfs:
      - /tmp
    ports:
      - "${DNS_BIND_IP:-127.0.0.1}:53:53/udp"
      - "${DNS_BIND_IP:-127.0.0.1}:53:53/tcp"
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/zones:/etc/coredns/zones:ro
      - ./logs:/var/log/coredns
    command:
      - exec /coredns -conf /etc/coredns/Corefile >> /var/log/coredns/coredns.log 2>&1
